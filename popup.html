<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>YTFocus</h1>
      <div class="master-toggle">
        <label class="switch">
          <input type="checkbox" id="masterToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="hideShorts">
        <span class="slider"></span>
      </label>
      <span class="label">Hide Shorts</span>
    </div>

    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="hideComments">
        <span class="slider"></span>
      </label>
      <span class="label">Hide Comments</span>
    </div>

    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="hideRecommendations">
        <span class="slider"></span>
      </label>
      <span class="label">Hide Recommendations</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
